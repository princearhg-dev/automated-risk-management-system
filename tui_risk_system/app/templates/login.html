<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TUI Risk Monitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background: #212529;
            color: white;
            border-radius: 8px 8px 0 0;
            padding: 1.5rem;
            text-align: center;
        }
        .login-header i {
            font-size: 2rem;
            color: #0dcaf0;
        }
    </style>
</head>
<body>
    <div class="login-card shadow">
        <!-- header with TUI branding -->
        <div class="login-header">
            <i class="bi bi-shield-lock mb-2"></i>
            <h5 class="mb-0 fw-bold">TUI Risk Monitor</h5>
            <small class="text-muted">Automated Security Risk Management</small>
        </div>

        <div class="card border-0 rounded-0 rounded-bottom">
            <div class="card-body p-4">
                <h6 class="text-muted mb-3">Sign in to continue</h6>

                {% if error %}
                <div class="alert alert-danger alert-sm py-2" role="alert">
                    <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="username" class="form-label small fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-person text-muted"></i>
                            </span>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label small fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light">
                                <i class="bi bi-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-dark w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                    </button>
                </form>
            </div>
        </div>

        <div class="text-center mt-2">
            <small class="text-muted">FYP Prototype &mdash; NIST SP 800-30 / ISO/IEC 27005</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
